<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>킵유어핏 메타 광고 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background:#081018; }
    .glass { background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(14px); }
    .grid-pattern {
      background-image:
        linear-gradient(rgba(148,163,184,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>
  <script type="text/babel">
    const kpis = [
      { label: '최근 7일 광고비', value: '22,694,420원', change: '+12.4%', positive: false },
      { label: '최근 7일 구매수', value: '148건', change: '+18.2%', positive: true },
      { label: '최근 7일 구매금액', value: '65,120,000원', change: '+21.7%', positive: true },
      { label: '최근 7일 ROAS', value: '2.87', change: '+8.9%', positive: true },
      { label: '최근 7일 CPA', value: '153,341원', change: '-7.1%', positive: true },
      { label: '최근 7일 CTR', value: '1.42%', change: '+0.13%p', positive: true }
    ];

    const campaigns = [
      { name: '신규고객 구매 전환', objective: '구매', spend: '8,240,000', roas: '3.41', cpa: '128,000', status: '증액 후보' },
      { name: '리타겟팅 전환', objective: '구매', spend: '4,910,000', roas: '4.12', cpa: '92,000', status: '유지' },
      { name: '퓨어타치온 관심사 확장', objective: '구매', spend: '5,320,000', roas: '2.18', cpa: '181,000', status: '점검 필요' },
      { name: '멜라라인 수면 테스트', objective: '트래픽', spend: '2,760,000', roas: '1.24', cpa: '246,000', status: '중단 후보' },
      { name: '올레샷 리마케팅', objective: '구매', spend: '1,464,420', roas: '2.95', cpa: '139,000', status: '유지' }
    ];

    const trend = [42, 55, 48, 61, 58, 72, 69];
    const roasTrend = [2.1, 2.4, 2.2, 2.8, 2.6, 3.1, 2.9];
    const dates = ['4/11', '4/12', '4/13', '4/14', '4/15', '4/16', '4/17'];

    function LineChart({ data, color = '#22c55e', fill = 'rgba(34,197,94,0.12)', max }) {
      const width = 560;
      const height = 220;
      const padding = 22;
      const chartMax = max || Math.max(...data) * 1.15;
      const points = data.map((v, i) => {
        const x = padding + (i * (width - padding * 2)) / (data.length - 1);
        const y = height - padding - ((v / chartMax) * (height - padding * 2));
        return [x, y];
      });
      const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');
      const areaPath = `${linePath} L ${points[points.length - 1][0]} ${height - padding} L ${points[0][0]} ${height - padding} Z`;
      return (
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-56">
          {[0,1,2,3].map(i => {
            const y = padding + ((height - padding * 2) / 4) * i;
            return <line key={i} x1={padding} y1={y} x2={width - padding} y2={y} stroke="rgba(148,163,184,0.18)" strokeDasharray="4 6" />;
          })}
          <path d={areaPath} fill={fill} />
          <path d={linePath} fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round" />
          {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="4" fill={color} />)}
        </svg>
      );
    }

    function StatusBadge({ status }) {
      const styles = {
        '증액 후보': 'bg-emerald-500/15 text-emerald-300 border-emerald-400/30',
        '유지': 'bg-sky-500/15 text-sky-300 border-sky-400/30',
        '점검 필요': 'bg-amber-500/15 text-amber-300 border-amber-400/30',
        '중단 후보': 'bg-rose-500/15 text-rose-300 border-rose-400/30'
      };
      return <span className={`inline-flex rounded-full border px-3 py-1 text-xs font-semibold ${styles[status]}`}>{status}</span>;
    }

    function App() {
      return (
        <div className="min-h-screen bg-slate-950 text-white grid-pattern">
          <header className="border-b border-white/10 bg-slate-950/80 backdrop-blur">
            <div className="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
              <div>
                <p className="text-sm font-medium text-emerald-300">킵유어핏 퍼포먼스 운영판</p>
                <h1 className="mt-1 text-2xl font-bold tracking-tight sm:text-3xl">메타 광고 웹 대시보드</h1>
                <p className="mt-2 max-w-2xl text-sm text-slate-300">광고비, 구매, ROAS 흐름을 한 화면에서 보고 증액, 유지, 점검 액션까지 바로 판단하는 구조입니다.</p>
              </div>
              <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
                <div className="glass rounded-2xl border border-white/10 px-4 py-3">
                  <div className="text-xs text-slate-400">기준 기간</div>
                  <div className="mt-1 font-semibold">최근 7일</div>
                </div>
                <div className="glass rounded-2xl border border-white/10 px-4 py-3">
                  <div className="text-xs text-slate-400">매체</div>
                  <div className="mt-1 font-semibold">Meta Ads</div>
                </div>
                <div className="glass rounded-2xl border border-white/10 px-4 py-3">
                  <div className="text-xs text-slate-400">업데이트</div>
                  <div className="mt-1 font-semibold">오늘 08:12</div>
                </div>
                <div className="glass rounded-2xl border border-white/10 px-4 py-3">
                  <div className="text-xs text-slate-400">상태</div>
                  <div className="mt-1 font-semibold text-emerald-300">자동 수집 정상</div>
                </div>
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
            <section className="grid gap-4 sm:grid-cols-2 xl:grid-cols-6">
              {kpis.map((item) => (
                <article key={item.label} className="glass rounded-3xl border border-white/10 p-5 shadow-2xl shadow-black/20 transition hover:border-emerald-400/30">
                  <p className="text-sm text-slate-400">{item.label}</p>
                  <p className="mt-3 text-2xl font-bold tracking-tight">{item.value}</p>
                  <p className={`mt-2 text-sm font-semibold ${item.positive ? 'text-emerald-300' : 'text-rose-300'}`}>{item.change}</p>
                </article>
              ))}
            </section>

            <section className="mt-8 grid gap-6 xl:grid-cols-[1.4fr,1fr]">
              <article className="glass rounded-3xl border border-white/10 p-6">
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <h2 className="text-xl font-bold">최근 7일 광고비 추이</h2>
                    <p className="mt-1 text-sm text-slate-400">광고비 증감과 집행 페이스를 먼저 확인하는 구간입니다.</p>
                  </div>
                  <div className="rounded-2xl bg-emerald-500/10 px-3 py-2 text-sm font-semibold text-emerald-300">전주 대비 +12.4%</div>
                </div>
                <div className="mt-6">
                  <LineChart data={trend} color="#34d399" fill="rgba(52,211,153,0.12)" max={80} />
                </div>
                <div className="mt-4 grid grid-cols-7 gap-2 text-center text-xs text-slate-400">
                  {dates.map(d => <div key={d}>{d}</div>)}
                </div>
              </article>

              <article className="glass rounded-3xl border border-white/10 p-6">
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <h2 className="text-xl font-bold">최근 7일 ROAS 추이</h2>
                    <p className="mt-1 text-sm text-slate-400">효율이 좋아졌는지, 단순히 광고비가 늘어난 건지 구분합니다.</p>
                  </div>
                  <div className="rounded-2xl bg-sky-500/10 px-3 py-2 text-sm font-semibold text-sky-300">현재 2.87</div>
                </div>
                <div className="mt-6">
                  <LineChart data={roasTrend} color="#60a5fa" fill="rgba(96,165,250,0.12)" max={3.6} />
                </div>
                <div className="mt-4 grid grid-cols-7 gap-2 text-center text-xs text-slate-400">
                  {dates.map(d => <div key={d}>{d}</div>)}
                </div>
              </article>
            </section>

            <section className="mt-8 grid gap-6 lg:grid-cols-3">
              <article className="glass rounded-3xl border border-emerald-400/20 p-6">
                <div className="flex items-center justify-between">
                  <h3 className="text-lg font-bold text-emerald-300">증액 후보</h3>
                  <span className="rounded-full bg-emerald-500/10 px-3 py-1 text-xs font-semibold text-emerald-300">2건</span>
                </div>
                <ul className="mt-4 space-y-4 text-sm text-slate-300">
                  <li className="rounded-2xl bg-white/5 p-4"><strong className="text-white">신규고객 구매 전환</strong><br/>ROAS 3.41, CPA 안정적. 예산 추가 여지 있음.</li>
                  <li className="rounded-2xl bg-white/5 p-4"><strong className="text-white">리타겟팅 전환</strong><br/>구매 효율이 가장 안정적이라 유지 이상 판단 가능.</li>
                </ul>
              </article>
              <article className="glass rounded-3xl border border-amber-400/20 p-6">
                <div className="flex items-center justify-between">
                  <h3 className="text-lg font-bold text-amber-300">점검 필요</h3>
                  <span className="rounded-full bg-amber-500/10 px-3 py-1 text-xs font-semibold text-amber-300">1건</span>
                </div>
                <ul className="mt-4 space-y-4 text-sm text-slate-300">
                  <li className="rounded-2xl bg-white/5 p-4"><strong className="text-white">퓨어타치온 관심사 확장</strong><br/>유입은 있으나 구매 전환이 약해 메시지, 랜딩, 타겟 점검 필요.</li>
                </ul>
              </article>
              <article className="glass rounded-3xl border border-rose-400/20 p-6">
                <div className="flex items-center justify-between">
                  <h3 className="text-lg font-bold text-rose-300">중단 후보</h3>
                  <span className="rounded-full bg-rose-500/10 px-3 py-1 text-xs font-semibold text-rose-300">1건</span>
                </div>
                <ul className="mt-4 space-y-4 text-sm text-slate-300">
                  <li className="rounded-2xl bg-white/5 p-4"><strong className="text-white">멜라라인 수면 테스트</strong><br/>광고비 대비 구매 성과가 약해 구조 재정비 전까지 축소 권장.</li>
                </ul>
              </article>
            </section>

            <section className="mt-8 grid gap-6 xl:grid-cols-[1.6fr,0.9fr]">
              <article className="glass overflow-hidden rounded-3xl border border-white/10">
                <div className="border-b border-white/10 px-6 py-5">
                  <h2 className="text-xl font-bold">캠페인 성과 테이블</h2>
                  <p className="mt-1 text-sm text-slate-400">대표님이 바로 증액, 유지, 점검 판단할 수 있게 캠페인별 핵심 값만 모았습니다.</p>
                </div>
                <div className="overflow-x-auto">
                  <table className="min-w-full text-left text-sm">
                    <thead className="bg-white/5 text-slate-300">
                      <tr>
                        {['캠페인명', '목적', '광고비', 'ROAS', 'CPA', '상태'].map(h => (
                          <th key={h} className="px-6 py-4 font-semibold">{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {campaigns.map((c, idx) => (
                        <tr key={c.name} className={idx !== campaigns.length - 1 ? 'border-b border-white/5' : ''}>
                          <td className="px-6 py-4 font-medium text-white">{c.name}</td>
                          <td className="px-6 py-4 text-slate-300">{c.objective}</td>
                          <td className="px-6 py-4 text-slate-300">{c.spend}</td>
                          <td className="px-6 py-4 font-semibold text-emerald-300">{c.roas}</td>
                          <td className="px-6 py-4 text-slate-300">{c.cpa}</td>
                          <td className="px-6 py-4"><StatusBadge status={c.status} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </article>

              <article className="glass rounded-3xl border border-white/10 p-6">
                <h2 className="text-xl font-bold">운영 메모</h2>
                <div className="mt-5 space-y-4 text-sm text-slate-300">
                  <div className="rounded-2xl bg-white/5 p-4">
                    <div className="text-xs font-semibold uppercase tracking-wide text-slate-400">이번 주 핵심 관찰</div>
                    <p className="mt-2">신규고객 구매 캠페인이 가장 높은 매출 기여를 만들고 있습니다. 클릭 효율보다 구매 효율 개선 폭이 더 컸습니다.</p>
                  </div>
                  <div className="rounded-2xl bg-white/5 p-4">
                    <div className="text-xs font-semibold uppercase tracking-wide text-slate-400">다음 액션</div>
                    <p className="mt-2">퓨어타치온은 후킹 문구를 분리 테스트하고, 멜라라인은 트래픽 목적 예산을 구매 목적 구조로 재배치하는 안을 검토합니다.</p>
                  </div>
                  <div className="rounded-2xl bg-white/5 p-4">
                    <div className="text-xs font-semibold uppercase tracking-wide text-slate-400">확장 예정</div>
                    <p className="mt-2">상품별 키워드, 광고세트 퍼널, 소재 문구 성과까지 붙이면 다음 버전에서 더 정확한 운영 판단이 가능합니다.</p>
                  </div>
                </div>
              </article>
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
