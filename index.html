<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>킵유어핏 메타 광고 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#081018; color:#fff; font-family: Inter, system-ui, sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(14px); }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen max-w-7xl mx-auto px-4 py-8"></div>
  <script>
    const WEEKLY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1pZASjdZr6YpG8bREsg7P8u7FZ0HvJwgb-U2kDIF9jhqBUo3J-7WcLiVzkF3eTFKc2TFWQmHNNNN9/pub?gid=1954711197&single=true&output=csv';
    const DAILY_TOTAL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1pZASjdZr6YpG8bREsg7P8u7FZ0HvJwgb-U2kDIF9jhqBUo3J-7WcLiVzkF3eTFKc2TFWQmHNNNN9/pub?gid=1863839864&single=true&output=csv';

    function splitCsvLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current);
      return result;
    }

    function parseCsv(text) {
      const cleaned = text.replace(/^\uFEFF/, '').trim();
      if (!cleaned) return [];
      const lines = cleaned.split(/\r?\n/);
      const headers = splitCsvLine(lines[0]);
      return lines.slice(1).map(line => {
        const values = splitCsvLine(line);
        const row = {};
        headers.forEach((header, index) => row[header] = values[index] || '');
        return row;
      });
    }

    function n(v) {
      const x = Number(String(v || '').replace(/,/g, ''));
      return Number.isFinite(x) ? x : 0;
    }

    function fmtNum(v) {
      return new Intl.NumberFormat('ko-KR').format(Math.round(v || 0));
    }

    function fmtWon(v) {
      return fmtNum(v) + '원';
    }

    function fmtRoas(v) {
      return Math.round((v || 0) * 100) + '%';
    }

    function statusOf(row) {
      const roas = n(row.ROAS_calc || row.purchase_roas);
      const cpa = n(row.CPA_calc || row.CPA_purchase);
      const spend = n(row.spend || row.spend_sum);
      const purchase = n(row.purchase_count || row.purchase_count_sum);
      if (roas >= 3 && purchase >= 10) return '증액 후보';
      if (roas >= 2) return '유지';
      if (spend >= 2000000 && purchase <= 3) return '중단 후보';
      return '점검 필요';
    }

    function card(label, value) {
      return `<div class="glass rounded-3xl border border-white/10 p-5"><div class="text-sm text-slate-400">${label}</div><div class="mt-3 text-2xl font-bold">${value}</div></div>`;
    }

    function render(data) {
      const app = document.getElementById('app');
      const weekly = data.weekly || [];
      const daily = data.daily || [];

      const totalSpend = weekly.reduce((s, r) => s + n(r.spend || r.spend_sum), 0);
      const totalPurchase = weekly.reduce((s, r) => s + n(r.purchase_count || r.purchase_count_sum), 0);
      const totalValue = weekly.reduce((s, r) => s + n(r.purchase_value || r.purchase_value_sum), 0);
      const roas = totalSpend ? totalValue / totalSpend : 0;
      const cpa = totalPurchase ? totalSpend / totalPurchase : 0;

      const top = weekly
        .map(r => ({
          name: r.campaign_name,
          objective: r.objective,
          spend: n(r.spend || r.spend_sum),
          roas: n(r.ROAS_calc || r.purchase_roas),
          cpa: n(r.CPA_calc || r.CPA_purchase),
          status: statusOf(r)
        }))
        .sort((a, b) => b.roas - a.roas)
        .slice(0, 10);

      const dailyRows = daily.map(r => `
        <tr class="border-b border-white/5">
          <td class="px-4 py-3">${r.date || ''}</td>
          <td class="px-4 py-3">${fmtWon(n(r.spend_sum))}</td>
          <td class="px-4 py-3">${fmtNum(n(r.purchase_count_sum))}건</td>
          <td class="px-4 py-3">${fmtWon(n(r.purchase_value_sum))}</td>
          <td class="px-4 py-3">${fmtRoas(n(r.roas_calc))}</td>
        </tr>`).join('');

      const campaignRows = top.map(r => `
        <tr class="border-b border-white/5">
          <td class="px-4 py-3">${r.name || ''}</td>
          <td class="px-4 py-3">${r.objective || ''}</td>
          <td class="px-4 py-3">${fmtWon(r.spend)}</td>
          <td class="px-4 py-3">${fmtRoas(r.roas)}</td>
          <td class="px-4 py-3">${fmtWon(r.cpa)}</td>
          <td class="px-4 py-3">${r.status}</td>
        </tr>`).join('');

      app.innerHTML = `
        <div class="mb-8">
          <div class="text-sm text-emerald-300 font-semibold">킵유어핏 퍼포먼스 운영판</div>
          <h1 class="mt-2 text-3xl font-bold">메타 광고 웹 대시보드</h1>
          <p class="mt-2 text-slate-300">실데이터 기반 최근 7일 운영 화면입니다.</p>
        </div>

        <div class="grid gap-4 md:grid-cols-5">
          ${card('최근 7일 광고비', fmtWon(totalSpend))}
          ${card('최근 7일 구매수', fmtNum(totalPurchase) + '건')}
          ${card('최근 7일 구매금액', fmtWon(totalValue))}
          ${card('최근 7일 ROAS', fmtRoas(roas))}
          ${card('최근 7일 CPA', fmtWon(cpa))}
        </div>

        <div class="mt-8 grid gap-6 lg:grid-cols-2">
          <div class="glass rounded-3xl border border-white/10 p-6 overflow-x-auto">
            <h2 class="text-xl font-bold mb-4">일자별 합산 데이터</h2>
            <table class="min-w-full text-sm text-left">
              <thead class="bg-white/5"><tr><th class="px-4 py-3">날짜</th><th class="px-4 py-3">광고비</th><th class="px-4 py-3">구매수</th><th class="px-4 py-3">구매금액</th><th class="px-4 py-3">ROAS</th></tr></thead>
              <tbody>${dailyRows}</tbody>
            </table>
          </div>

          <div class="glass rounded-3xl border border-white/10 p-6 overflow-x-auto">
            <h2 class="text-xl font-bold mb-4">캠페인 성과</h2>
            <table class="min-w-full text-sm text-left">
              <thead class="bg-white/5"><tr><th class="px-4 py-3">캠페인명</th><th class="px-4 py-3">목적</th><th class="px-4 py-3">광고비</th><th class="px-4 py-3">ROAS</th><th class="px-4 py-3">CPA</th><th class="px-4 py-3">상태</th></tr></thead>
              <tbody>${campaignRows}</tbody>
            </table>
          </div>
        </div>`;
    }

    async function boot() {
      const app = document.getElementById('app');
      app.innerHTML = '<div class="text-slate-300">데이터 불러오는 중...</div>';
      try {
        const [weeklyRes, dailyRes] = await Promise.all([fetch(WEEKLY_CSV), fetch(DAILY_TOTAL_CSV)]);
        const [weeklyText, dailyText] = await Promise.all([weeklyRes.text(), dailyRes.text()]);
        render({ weekly: parseCsv(weeklyText), daily: parseCsv(dailyText) });
      } catch (e) {
        console.error(e);
        app.innerHTML = '<div class="text-red-300">대시보드를 불러오지 못했습니다. 잠시 후 다시 새로고침해 주세요.</div>';
      }
    }

    boot();
  </script>
</body>
</html>
