<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>킵유어핏 메타 광고 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div id="app" class="max-w-7xl mx-auto px-4 py-10">
    <div class="text-slate-300">데이터 불러오는 중...</div>
  </div>

  <script>
    const WEEKLY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1pZASjdZr6YpG8bREsg7P8u7FZ0HvJwgb-U2kDIF9jhqBUo3J-7WcLiVzkF3eTFKc2TFWQmHNNNN9/pub?gid=1954711197&single=true&output=csv';
    const DAILY_TOTAL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1pZASjdZr6YpG8bREsg7P8u7FZ0HvJwgb-U2kDIF9jhqBUo3J-7WcLiVzkF3eTFKc2TFWQmHNNNN9/pub?gid=1863839864&single=true&output=csv';

    function splitCsvLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current);
      return result;
    }

    function parseCsv(text) {
      const cleaned = text.replace(/^\uFEFF/, '').trim();
      if (!cleaned) return [];
      const lines = cleaned.split(/\r?\n/);
      const headers = splitCsvLine(lines[0]);
      return lines.slice(1).map(line => {
        const values = splitCsvLine(line);
        const row = {};
        headers.forEach((header, index) => { row[header] = values[index] || ''; });
        return row;
      });
    }

    function n(v) {
      const x = Number(String(v || '').replace(/,/g, ''));
      return Number.isFinite(x) ? x : 0;
    }

    function fmtNum(v) { return new Intl.NumberFormat('ko-KR').format(Math.round(v || 0)); }
    function fmtWon(v) { return fmtNum(v) + '원'; }
    function fmtRoas(v) { return Math.round((v || 0) * 100) + '%'; }

    function statusOf(row) {
      const roas = n(row.ROAS_calc || row.purchase_roas);
      const cpa = n(row.CPA_calc || row.CPA_purchase);
      const spend = n(row.spend || row.spend_sum);
      const purchase = n(row.purchase_count || row.purchase_count_sum);
      if (roas >= 3 && purchase >= 10) return '증액 후보';
      if (roas >= 2) return '유지';
      if (spend >= 2000000 && purchase <= 3) return '중단 후보';
      return '점검 필요';
    }

    function badge(status) {
      const map = {
        '증액 후보': 'bg-emerald-500/15 text-emerald-300 border-emerald-400/30',
        '유지': 'bg-sky-500/15 text-sky-300 border-sky-400/30',
        '점검 필요': 'bg-amber-500/15 text-amber-300 border-amber-400/30',
        '중단 후보': 'bg-rose-500/15 text-rose-300 border-rose-400/30'
      };
      return '<span class="inline-flex rounded-full border px-3 py-1 text-xs font-semibold ' + (map[status] || map['점검 필요']) + '">' + status + '</span>';
    }

    function buildSparkBars(rows, key, colorClass) {
      if (!rows.length) return '';
      const max = Math.max.apply(null, rows.map(r => n(r[key])));
      return rows.map(r => {
        const h = max ? Math.max(12, Math.round((n(r[key]) / max) * 140)) : 12;
        const tooltip = [
          '날짜: ' + (r.date || ''),
          '광고비: ' + fmtWon(n(r.spend_sum)),
          '구매수: ' + fmtNum(n(r.purchase_count_sum)) + '건',
          '매출금액: ' + fmtWon(n(r.purchase_value_sum)),
          'ROAS: ' + fmtRoas(n(r.roas_calc))
        ].join('\n');
        return '<div class="group relative flex-1 flex flex-col justify-end items-center gap-2">' +
          '<div class="absolute bottom-full mb-2 hidden whitespace-pre rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-xs text-slate-200 shadow-xl group-hover:block z-10">' + tooltip + '</div>' +
          '<div class="w-full rounded-t-lg ' + colorClass + '" style="height:' + h + 'px"></div>' +
          '<div class="text-[11px] text-slate-400">' + (r.date || '').slice(5).replace('-', '/') + '</div>' +
          '</div>';
      }).join('');
    }

    async function boot() {
      const app = document.getElementById('app');
      try {
        const [weeklyRes, dailyRes] = await Promise.all([fetch(WEEKLY_CSV), fetch(DAILY_TOTAL_CSV)]);
        const [weeklyText, dailyText] = await Promise.all([weeklyRes.text(), dailyRes.text()]);
        const weeklyRows = parseCsv(weeklyText);
        const dailyRows = parseCsv(dailyText);

        const totalSpend = weeklyRows.reduce((s, r) => s + n(r.spend || r.spend_sum), 0);
        const totalPurchase = weeklyRows.reduce((s, r) => s + n(r.purchase_count || r.purchase_count_sum), 0);
        const totalValue = weeklyRows.reduce((s, r) => s + n(r.purchase_value || r.purchase_value_sum), 0);
        const roas = totalSpend ? totalValue / totalSpend : 0;
        const cpa = totalPurchase ? totalSpend / totalPurchase : 0;
        const weekStart = weeklyRows[0] ? weeklyRows[0].week_start : '';
        const weekEnd = weeklyRows[0] ? weeklyRows[0].week_end : '';

        const sorted = weeklyRows.map(r => ({
          campaign_name: r.campaign_name,
          objective: r.objective,
          spend: n(r.spend || r.spend_sum),
          roas: n(r.ROAS_calc || r.purchase_roas),
          cpa: n(r.CPA_calc || r.CPA_purchase),
          status: statusOf(r)
        })).sort((a, b) => b.roas - a.roas);

        const topBoost = sorted.filter(r => r.status === '증액 후보').slice(0, 2);
        const needCheck = sorted.filter(r => r.status === '점검 필요').slice(0, 2);
        const stopList = sorted.filter(r => r.status === '중단 후보').slice(0, 2);

        const cards = [
          ['최근 7일 광고비', fmtWon(totalSpend)],
          ['최근 7일 구매수', fmtNum(totalPurchase) + '건'],
          ['최근 7일 구매금액', fmtWon(totalValue)],
          ['최근 7일 ROAS', fmtRoas(roas)],
          ['최근 7일 CPA', fmtWon(cpa)]
        ].map(([label, value]) => `
          <div class="rounded-3xl border border-white/10 bg-slate-900 p-5">
            <div class="text-sm text-slate-400">${label}</div>
            <div class="mt-3 text-2xl font-bold">${value}</div>
          </div>
        `).join('');

        const tableRows = sorted.map(r => `
          <tr class="border-b border-white/5">
            <td class="px-4 py-3">${r.campaign_name || ''}</td>
            <td class="px-4 py-3">${r.objective || ''}</td>
            <td class="px-4 py-3">${fmtWon(r.spend)}</td>
            <td class="px-4 py-3">${fmtRoas(r.roas)}</td>
            <td class="px-4 py-3">${fmtWon(r.cpa)}</td>
            <td class="px-4 py-3">${badge(r.status)}</td>
          </tr>
        `).join('');

        function actionList(list, emptyText) {
          if (!list.length) return '<div class="text-slate-400 text-sm">' + emptyText + '</div>';
          return list.map(item => '<div class="rounded-2xl bg-white/5 p-4 text-sm"><div class="font-semibold text-white">' + item.campaign_name + '</div><div class="text-slate-300 mt-2">ROAS ' + fmtRoas(item.roas) + ' / CPA ' + fmtWon(item.cpa) + '</div></div>').join('');
        }

        app.innerHTML = `
          <div class="mb-8">
            <div class="text-emerald-300 text-sm font-semibold">킵유어핏 퍼포먼스 운영판</div>
            <h1 class="text-3xl font-bold mt-2">메타 광고 웹 대시보드</h1>
            <p class="text-slate-300 mt-2">실데이터 기준 복구 버전</p>
            <p class="text-slate-400 mt-2 text-sm">기준 기간: ${weekStart} ~ ${weekEnd}</p>
          </div>

          <div class="grid md:grid-cols-5 gap-4">${cards}</div>

          <div class="mt-8 grid lg:grid-cols-2 gap-6">
            <div class="rounded-3xl border border-white/10 bg-slate-900 p-6">
              <div class="flex items-center justify-between mb-4">
                <div class="text-xl font-bold">최근 7일 광고비 추이</div>
                <div class="text-sm text-emerald-300">실데이터</div>
              </div>
              <div class="h-48 flex items-end gap-2">${buildSparkBars(dailyRows, 'spend_sum', 'bg-emerald-400')}</div>
            </div>

            <div class="rounded-3xl border border-white/10 bg-slate-900 p-6">
              <div class="flex items-center justify-between mb-4">
                <div class="text-xl font-bold">최근 7일 ROAS 추이</div>
                <div class="text-sm text-sky-300">실데이터</div>
              </div>
              <div class="h-48 flex items-end gap-2">${buildSparkBars(dailyRows, 'roas_calc', 'bg-sky-400')}</div>
            </div>
          </div>

          <div class="mt-8 grid lg:grid-cols-3 gap-6">
            <div class="rounded-3xl border border-emerald-400/20 bg-slate-900 p-6">
              <div class="text-lg font-bold text-emerald-300 mb-4">증액 후보</div>
              ${actionList(topBoost, '현재 증액 후보 없음')}
            </div>
            <div class="rounded-3xl border border-amber-400/20 bg-slate-900 p-6">
              <div class="text-lg font-bold text-amber-300 mb-4">점검 필요</div>
              ${actionList(needCheck, '현재 점검 대상 없음')}
            </div>
            <div class="rounded-3xl border border-rose-400/20 bg-slate-900 p-6">
              <div class="text-lg font-bold text-rose-300 mb-4">중단 후보</div>
              ${actionList(stopList, '현재 중단 후보 없음')}
            </div>
          </div>

          <div class="mt-8 grid xl:grid-cols-[1.6fr,0.9fr] gap-6">
            <div class="rounded-3xl border border-white/10 bg-slate-900 p-6 overflow-x-auto">
              <div class="text-xl font-bold mb-4">캠페인 성과</div>
              <table class="min-w-full text-sm text-left">
                <thead class="bg-white/5">
                  <tr>
                    <th class="px-4 py-3">캠페인명</th>
                    <th class="px-4 py-3">목적</th>
                    <th class="px-4 py-3">광고비</th>
                    <th class="px-4 py-3">ROAS</th>
                    <th class="px-4 py-3">CPA</th>
                    <th class="px-4 py-3">상태</th>
                  </tr>
                </thead>
                <tbody>${tableRows}</tbody>
              </table>
            </div>

            <div class="rounded-3xl border border-white/10 bg-slate-900 p-6">
              <div class="text-xl font-bold mb-4">운영 메모</div>
              <div class="space-y-4 text-sm text-slate-300">
                <div class="rounded-2xl bg-white/5 p-4">최근 7일 기준으로 실데이터를 불러와 카드, 차트, 표, 액션 박스를 복구한 상태입니다.</div>
                <div class="rounded-2xl bg-white/5 p-4">다음 단계는 메타 관리자 실제값과 숫자 차이를 다시 검증하고 필요한 계산 로직만 보정하는 것입니다.</div>
                <div class="rounded-2xl bg-white/5 p-4">이후 상품별, 소재별, 키워드별 기능을 붙이면 됩니다.</div>
              </div>
            </div>
          </div>
        `;
      } catch (e) {
        console.error(e);
        app.innerHTML = '<div class="text-red-300">실데이터를 불러오지 못했습니다. 다시 새로고침해 주세요.</div>';
      }
    }

    boot();
  </script>
</body>
</html>
